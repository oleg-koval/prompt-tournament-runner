<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Tournament Runner social card</title>
  <desc id="desc">Compare prompt variants, score the outputs, keep the winner. Local-first, no API keys.</desc>
  <rect width="1200" height="630" fill="#0b1120"/>
  <rect x="40" y="40" width="1120" height="550" rx="36" fill="#0f172a" stroke="#1f2937" stroke-width="2"/>

  <!-- logo mark -->
  <g transform="translate(96 96)">
    <rect width="132" height="132" rx="30" fill="#0f172a" stroke="#334155" stroke-width="3"/>
    <rect x="30" y="78" width="20" height="30" rx="5" fill="#475569"/>
    <rect x="56" y="64" width="20" height="44" rx="5" fill="#64748b"/>
    <rect x="82" y="44" width="20" height="64" rx="5" fill="#22c55e"/>
    <path d="M84 30l6 7 12 -15" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="260" y="150" fill="#f1f5f9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="800">Prompt Tournament Runner</text>
  <text x="260" y="200" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28">Compare prompt variants. Score the outputs. Keep the winner.</text>

  <g transform="translate(96 296)">
    <rect width="470" height="58" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="22" y="38" fill="#67e8f9" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">npm run serve</text>
  </g>

  <g transform="translate(96 404)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600">
    <text x="0" y="0" fill="#22c55e">Local-first</text>
    <text x="220" y="0" fill="#cbd5e1">No API keys</text>
    <text x="470" y="0" fill="#cbd5e1">TypeScript · MIT</text>
  </g>

  <!-- ranked bars motif -->
  <g transform="translate(820 250)">
    <rect x="0" y="150" width="70" height="120" rx="16" fill="#475569"/>
    <rect x="100" y="86" width="70" height="184" rx="16" fill="#64748b"/>
    <rect x="200" y="0" width="70" height="270" rx="16" fill="#22c55e"/>
    <path d="M212 -52l20 22 40 -52" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
