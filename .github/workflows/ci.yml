name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.10.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check, lint, and test
        run: npm run ci

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
